server:
  public_url: "http://localhost:8080"
  broker_listen: "127.0.0.1:8080"

metadata:
  sqlite_path: "./tmp/gatebase.db"

sessions:
  default_ttl: "15m"
  max_ttl: "30m"
  signing_key_file: "./tmp/session.key"

github:
  app_id: "local-dev"
  installation_id: 123456
  private_key_file: "./tmp/github.pem"
  webhook_secret: "local-dev-secret"
  api_base_url: "https://api.github.com"

access:
  allowed_repositories:
    - "gatebase/gatebase"
  required_signals:
    - type: "github_pull_request_open"
    - type: "github_pull_request_approved"
    - type: "github_checks_passed"
      checks:
        - "ci"
    - type: "github_labels"
      labels:
        - "db-access-approved"
    # Uncomment to require an operator-created approval before issuing sessions:
    # - type: "cli_approval"
    #   approvers:
    #     - "security-oncall"
    #   allow_without_pull_request: false

audit:
  fail_closed: true
  sinks:
    - type: "sqlite"
    - type: "jsonl"
      path: "./tmp/audit.jsonl"

targets:
  - name: "prod-pg"
    engine: "postgres"
    listen: "127.0.0.1:15432"
    upstream: "127.0.0.1:5432"
    database: "app"
    credentials:
      username_env: "PG_UPSTREAM_USER"
      password_env: "PG_UPSTREAM_PASSWORD"

policies:
  default:
    block:
      - "drop_database"
      - "drop_table"
      - "truncate"
      - "alter_system"
    require_where:
      - "update"
      - "delete"
    max_rows_changed: 1000
