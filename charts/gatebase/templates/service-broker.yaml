{{- if .Values.broker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gatebase.fullname" . }}-broker
  labels:
    {{- include "gatebase.labels" . | nindent 4 }}
spec:
  type: {{ .Values.broker.service.type }}
  ports:
    - name: http
      port: {{ .Values.broker.service.port }}
      targetPort: http
  selector:
    {{- include "gatebase.selectorLabels" . | nindent 4 }}
{{- end }}
