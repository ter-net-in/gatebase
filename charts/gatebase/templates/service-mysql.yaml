{{- if .Values.mysqlProxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gatebase.fullname" . }}-mysql
  labels:
    {{- include "gatebase.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mysqlProxy.service.type }}
  ports:
    - name: mysql
      port: {{ .Values.mysqlProxy.service.port }}
      targetPort: mysql
  selector:
    {{- include "gatebase.selectorLabels" . | nindent 4 }}
{{- end }}
