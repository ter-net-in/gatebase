{{- if not .Values.secrets.existingSecret }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "gatebase.secretName" .) }}
{{- $existingAdminKey := "" }}
{{- $existingSessionKey := "" }}
{{- if and $existing (hasKey $existing.data "admin.key") }}
{{- $existingAdminKey = (index $existing.data "admin.key" | b64dec) }}
{{- end }}
{{- if and $existing (hasKey $existing.data "session.key") }}
{{- $existingSessionKey = (index $existing.data "session.key" | b64dec) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gatebase.secretName" . }}
  labels:
    {{- include "gatebase.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin.key: {{ default (default (randAlphaNum 64) $existingAdminKey) .Values.secrets.adminKey | quote }}
  session.key: {{ default (default (randAlphaNum 64) $existingSessionKey) .Values.secrets.sessionKey | quote }}
  {{- if .Values.secrets.metadataUrl }}
  GATEBASE_METADATA_URL: {{ .Values.secrets.metadataUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.githubPrivateKey }}
  github-app.pem: |
{{ .Values.secrets.githubPrivateKey | indent 4 }}
  {{- end }}
  PG_UPSTREAM_USER: {{ .Values.secrets.postgresUsername | quote }}
  PG_UPSTREAM_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  MYSQL_UPSTREAM_USER: {{ .Values.secrets.mysqlUsername | quote }}
  MYSQL_UPSTREAM_PASSWORD: {{ .Values.secrets.mysqlPassword | quote }}
{{- end }}
