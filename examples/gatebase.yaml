server:
  public_url: "http://localhost:8080"
  broker_listen: "127.0.0.1:8080"

admin:
  signing_key_file: "./tmp/admin.key"

metadata:
  backend: "sqlite"
  url: "sqlite://./tmp/gatebase.db?mode=rwc"

sessions:
  default_ttl: "15m"
  max_ttl: "30m"
  signing_key_file: "./tmp/session.key"

github:
  app_id: "local-dev"
  installation_id: 123456
  private_key_file: "./tmp/github.pem"
  webhook_secret: "local-dev-secret"
  api_base_url: "https://api.github.com"

audit:
  fail_closed: true
  sinks:
    - type: "sqlite"
    - type: "jsonl"
      path: "./tmp/audit.jsonl"

rollback:
  enabled: false
  max_rows: 100
  sinks:
    - type: "sqlite"
    - type: "jsonl"
      path: "./tmp/rollback.jsonl"

retention:
  audit_days: 90
  rollback_days: 30
  session_days: 30
  approval_days: 30
  active_connection_days: 7

targets:
  - name: "prod-pg"
    engine: "postgres"
    access:
      github_repo: "gatebase/gatebase"
      access_token_ttl: "5m"
      required_signals:
        - type: "github_issue_open"
        - type: "github_issue_labels"
          labels:
            - "approved"
    listen: "127.0.0.1:15432"
    upstream: "127.0.0.1:5432"
    database: "app"
    credentials:
      username: "${PG_UPSTREAM_USER}"
      password: "${PG_UPSTREAM_PASSWORD}"

policies:
  default:
    block:
      - "drop_database"
      - "drop_table"
      - "truncate"
      - "alter_system"
    require_where:
      - "update"
      - "delete"
    max_rows_changed: 1000
